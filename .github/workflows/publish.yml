name: publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  wheels:
    name: Wheels (${{ matrix.platform.runner }} / ${{ matrix.platform.target }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { runner: ubuntu-latest, target: x86_64, manylinux: auto }
          - { runner: ubuntu-latest, target: aarch64, manylinux: auto }
          # musl (Alpine etc.): without these, musl users fall back to the sdist
          # and need a Rust toolchain to install.
          - { runner: ubuntu-latest, target: x86_64, manylinux: musllinux_1_2 }
          - { runner: ubuntu-latest, target: aarch64, manylinux: musllinux_1_2 }
          - { runner: macos-13, target: x86_64, manylinux: auto }
          - { runner: macos-14, target: aarch64, manylinux: auto }
          - { runner: windows-latest, target: x64, manylinux: auto }
    steps:
      - uses: actions/checkout@v4
      # abi3 wheels: one wheel per platform covers Python 3.10+.
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: markitdown-cosense
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          sccache: "true"
          manylinux: ${{ matrix.platform.manylinux }}
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform.runner }}-${{ matrix.platform.target }}-${{ matrix.platform.manylinux }}
          path: markitdown-cosense/dist

  verify-wheel:
    name: Verify built wheel (linux x86_64)
    needs: [wheels]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v4
        with:
          name: wheels-ubuntu-latest-x86_64-auto
          path: dist
      # Install the actual built wheel (not the source tree) and run the plugin
      # test suite against it, so a broken package never reaches PyPI.
      - run: python -m pip install "$(ls dist/*.whl)" pytest
      - name: Smoke import and convert
        run: |
          python - <<'PY'
          import markitdown_cosense
          from markitdown_cosense import _core
          assert _core.convert("[* Title]") == "# Title"
          assert _core.looks_like_cosense("[* Title]")
          print("wheel ok:", markitdown_cosense.__version__)
          PY
      - name: Plugin test suite against the installed wheel
        working-directory: markitdown-cosense
        run: python -m pytest

  sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: markitdown-cosense
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: markitdown-cosense/dist

  publish:
    name: Publish to PyPI
    needs: [wheels, sdist, verify-wheel]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          verbose: true
