name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust:
    name: Rust (fmt / clippy / test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo fmt --all --check
      - run: cargo clippy -p cosense-core -p cosense-py --all-targets -- -D warnings
      - run: cargo clippy -p cosense-wasm --target wasm32-unknown-unknown -- -D warnings
      # Golden conformance (markdown fixture) and proptest invariants.
      - run: cargo test -p cosense-core

  lint:
    name: Python Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: markitdown-cosense
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - run: |
          uv sync --extra dev
          uv run ruff format --check python tests
          uv run ruff check python tests --output-format=github

  typecheck:
    name: Python Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: markitdown-cosense
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - run: |
          uv sync --extra dev
          uv run pyright

  test:
    name: Python Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: markitdown-cosense
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - run: |
          uv sync --extra dev
          uv run pytest
          uv run markitdown --use-plugins tests/test_cosense_notation.txt > /tmp/out.md
          # Smoke: the plugin actually ran and produced known Markdown output.
          test -s /tmp/out.md
          grep -qF '# Heading Level 1' /tmp/out.md
